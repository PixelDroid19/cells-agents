requirements_catalog:
  REQ-CATALOG-FIRST: "Catalog-first evidence routing must be applied before fallback."
  REQ-DETERMINISTIC-FALLBACK: "Fallback order and escalation criteria must be deterministic and justified."
  REQ-TRACEABILITY: "Source decisions and evidence quality must be traceable in outputs."
  REQ-EVIDENCE-QUALITY-GATES: "Outputs must express blocked/partial when evidence minimums are not met."
  REQ-CROSS-LAYER-PARITY: "Instructions, prompts, shared skills, and phase skills must remain policy-consistent."
  REQ-NON-DESTRUCTIVE-ENFORCEMENT: "Operational guidance must default to safe, non-destructive behavior."
  REQ-DELEGATE-FIRST: "Delegate-first orchestration with delegate-when-available and task fallback must remain explicit."
  REQ-CONTRIBUTION-GATES: "Issue approval, PR, review, and merge gates must remain explicit in contributor-facing guidance."
